services:
  db:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: depo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb/zz-create-test-db.sql:/docker-entrypoint-initdb.d/zz-create-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d depo"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/depo
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat-v3-0324}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-depo@localhost}
      RUN_SCHEDULER: "1"
    # Retry migrations: the postgis image restarts once during first-boot init,
    # so a single healthcheck pass can race the final server start.
    command: sh -c "until alembic upgrade head; do echo 'db not ready, retrying...'; sleep 2; done && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
