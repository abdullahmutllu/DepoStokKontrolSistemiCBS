# frontend'i VITE_DEMO=1 ile derleyip GitHub Pages'e yayınlar.
# Demo'da API, MSW service worker'ı ile tamamen tarayıcıda çalışır (sunucu yok).
name: Demo (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/demo-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vite build --base=/DepoStokKontrolSistemiCBS/
        env:
          VITE_DEMO: "1"
      # SPA fallback: Pages 404'ü uygulamayı yükler, router yolu devralır
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
